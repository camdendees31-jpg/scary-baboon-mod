name: Build Scary Baboon Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install QPM
        run: |
          curl -Lo qpm.zip https://github.com/QuestPackageManager/QPM.CLI/releases/download/v1.5.9/qpm-linux-x64.zip
          unzip qpm.zip
          chmod +x qpm
          sudo mv qpm /usr/local/bin/qpm
          qpm --version

      - name: QPM Restore
        run: qpm restore

      - name: Setup NDK
        run: |
          qpm ndk resolve -d
          NDK=$(find ~ -name "android.toolchain.cmake" 2>/dev/null | head -1 | xargs dirname | xargs dirname | xargs dirname)
          echo "NDK_PATH=$NDK" >> $GITHUB_ENV
          echo "Found NDK at $NDK"

      - name: Install Ninja & CMake
        run: sudo apt-get install -y ninja-build cmake

      - name: Build
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.NDK_PATH }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-31 \
            -DANDROID_STL=c++_static \
            -GNinja
          ninja

      - name: Upload .so
        uses: actions/upload-artifact@v4
        with:
          name: libscary-baboon-mod
          path: build/libscary-baboon-mod.so
